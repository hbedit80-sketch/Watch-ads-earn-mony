<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* तपाईँको पुरानो CSS यहाँ यथावत छ... */
        body { margin: 0; background: #f8f9fa; font-family: 'Poppins', sans-serif; padding-bottom: 70px; }
        .header { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; padding: 35px 20px 25px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; position: relative; box-shadow: 0 4px 12px rgba(37, 117, 252, 0.2); }
        .balance-btn { position: absolute; left: 15px; top: 15px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); color: #ffffff; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3); }
        .service-title { text-align: center; font-size: 13px; font-weight: bold; margin: 15px 0 8px; color: #555; }
        .customer-service { display: flex; justify-content: space-around; padding: 12px 5px; background: white; margin: 0 15px 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .service-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .service-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; margin-bottom: 4px; }
        .service-name { font-size: 9px; font-weight: 600; color: #666; }
        .ws { background: #25D366; } .tg { background: #0088cc; } .yt { background: #FF0000; } .fb { background: #1877F2; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px 15px; }
        .box { padding: 25px 10px; text-align: center; border-radius: 18px; color: white; font-weight: bold; font-size: 14px; box-shadow: 0 5px 10px rgba(0,0,0,0.08); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; min-height: 70px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .bg-1 { background: linear-gradient(135deg, #FF5F6D, #FFC371); }
        .bg-2 { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
        .bg-3 { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .bg-4 { background: linear-gradient(135deg, #F2994A, #F2C94C); }
        .bg-5 { background: linear-gradient(135deg, #8E2DE2, #4A00E0); }
        .bg-6 { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .nav-item { text-align: center; color: #888; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: #2575fc; }

        /* विज्ञापनको लागि नयाँ स्टाइल */
        #adOverlay {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000; z-index: 99999;
        }
        .close-ad-btn {
            position: absolute; top: 20px; right: 20px; 
            background: rgba(255, 255, 255, 0.9); color: black; 
            border: none; padding: 10px 20px; border-radius: 30px; 
            font-weight: bold; cursor: pointer; z-index: 100000;
            display: none; /* सुरुमा लुकेको हुन्छ, केही बेरपछि मात्र देखिन्छ */
        }
    </style>
</head>
<body>

<div class="header">
    <div class="balance-btn">रु. <span id="balance">0.00</span></div>
    <h3 style="margin: 5px 0 0; font-size: 18px;">Watch Video Earn Money</h3>
</div>

<div id="adOverlay">
    <button id="closeBtn" class="close-ad-btn" onclick="closeAd()">Close X</button>
    <iframe id="adFrame" src="" style="width:100%; height:100%; border:none;"></iframe>
</div>

<div class="service-title">Customer Service</div>
<div class="customer-service">
    <div class="service-item" onclick="window.open('https://wa.me/9744706803')"><div class="service-icon ws"><i class="fab fa-whatsapp"></i></div><span class="service-name">WhatsApp</span></div>
    <div class="service-item" onclick="window.open('https://t.me/watchads11')"><div class="service-icon tg"><i class="fab fa-telegram-plane"></i></div><span class="service-name">Telegram</span></div>
    <div class="service-item" onclick="window.open('https://youtube.com/c/@watchads11')"><div class="service-icon yt"><i class="fab fa-youtube"></i></div><span class="service-name">YouTube</span></div>
   <div class="service-item" onclick="window.open('https://www.facebook.com/profile.php?id=100095014792136')">
    <div class="service-icon fb">
        <i class="fab fa-facebook-f"></i>
    </div>
    <span class="service-name">Facebook</span>
</div>

</div>

<div class="grid-container">
    <div class="box bg-1" onclick="goToCategory('history', 'विश्व इतिहास')">ईतिहास पढ्नुस</div>
    <div class="box bg-2" onclick="goToCategory('shayari', 'नेपाली सायरि')">सायरि पढ्नुस</div>
    <div class="box bg-3" onclick="goToCategory('motivation', 'Motivation Line')">Motivation Line</div>
    <div class="box bg-4" id="watchAdBox" onclick="showAds()">Watch Ads 📺</div>
    <div class="box bg-5" onclick="goToCategory('biography', 'जीवनी पढ्नुस')">जिबनी पढ्नुस</div>
    <div class="box bg-6" onclick="goToCategory('lifestyle', 'Celebrity Lifestyle')">Celebrity Lifestyle</div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="location.href='index.html'"><i class="fa fa-home"></i><span>Home</span></div>
    <div class="nav-item" onclick="location.href='history_content.html'"><i class="fa fa-history"></i><span>History</span></div> 
    <div class="nav-item" onclick="location.href='profile.html'"><i class="fa fa-user"></i><span>Profile</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJg13_ijiXoMs-WZEqLjl0TVO8QBp3eEc",
        authDomain: "watch-vidwo.firebaseapp.com",
        projectId: "watch-vidwo",
        storageBucket: "watch-vidwo.firebasestorage.app",
        messagingSenderId: "241433573771",
        appId: "1:241433573771:web:2dce688d35f4cef910578e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const currentUserPhone = localStorage.getItem("currentUser");
    let currentBalance = 0.00;
    let canEarn = false; // विज्ञापन हेरेको पक्का गर्न

    window.onload = function() {
        if(!currentUserPhone) {
            window.location.href = "auth.html";
            return;
        }
        db.ref('users/' + currentUserPhone).on('value', (snapshot) => {
            const user = snapshot.val();
            if(user) {
                currentBalance = parseFloat(user.referBalance || 0);
                document.getElementById('balance').innerText = currentBalance.toFixed(2);
            }
        });
    };

    // विज्ञापन देखाउने फङ्सन
    function showAds() {
        const adLink = "https://omg10.com/4/10807361"; // तपाईँको Direct Link
        const overlay = document.getElementById('adOverlay');
        const frame = document.getElementById('adFrame');
        const closeBtn = document.getElementById('closeBtn');

        // विज्ञापन लोड गर्ने
        frame.src = adLink;
        overlay.style.display = "block";
        closeBtn.style.display = "none";
        canEarn = false;

        // ७ सेकेन्ड पछि मात्र "Close" बटन देखाउने (जसले गर्दा प्रयोगकर्ताले विज्ञापन हेर्नै पर्छ)
        setTimeout(() => {
            closeBtn.style.display = "block";
            canEarn = true; // अब पैसा पाउन योग्य भयो
        }, 7000); 
    }

    // विज्ञापन बन्द गर्ने र पैसा थप्ने
    function closeAd() {
        const overlay = document.getElementById('adOverlay');
        const frame = document.getElementById('adFrame');

        if(canEarn) {
            let reward = 0.05;
            let newBalance = currentBalance + reward;

            db.ref('users/' + currentUserPhone).update({
                referBalance: newBalance
            }).then(() => {
                alert("बधाई छ! विज्ञापन पूरा हेर्नुभयो, रु ०.०५ थपियो।");
            });
        }

        overlay.style.display = "none";
        frame.src = ""; // विज्ञापन रोक्न
    }

    function goToCategory(type, name) {
        location.href = `content.html?type=${type}&name=${encodeURIComponent(name)}`;
    }
</script>
</body>
</html>
