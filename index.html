<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #f8f9fa; font-family: 'Mukta', 'Poppins', sans-serif; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; padding: 35px 20px 25px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; position: relative; box-shadow: 0 4px 12px rgba(37, 117, 252, 0.2); }
        .balance-btn { position: absolute; left: 15px; top: 15px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); color: #ffffff; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3); }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px 15px; }
        .box { padding: 25px 10px; text-align: center; border-radius: 18px; color: white; font-weight: bold; font-size: 14px; box-shadow: 0 5px 10px rgba(0,0,0,0.08); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; min-height: 70px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        
        /* नयाँ अझै आकर्षक प्रिमियम बाकस (Ultra Premium Ad Box) */
        .bg-ad-premium { 
            background: linear-gradient(45deg, #FF00CC, #333399); 
            grid-column: span 2; 
            animation: pulse 1.5s infinite;
            border: 2px solid gold;
            font-size: 17px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(255, 0, 204, 0.4);
        }

        /* चम्किने इफेक्ट (Shine Effect) */
        .bg-ad-premium::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(255, 215, 0, 0.5); }
            100% { transform: scale(1); }
        }

        .bg-1 { background: linear-gradient(135deg, #FF5F6D, #FFC371); } 
        .bg-2 { background: linear-gradient(135deg, #2193b0, #6dd5ed); } 
        .bg-3 { background: linear-gradient(135deg, #11998e, #38ef7d); } 
        .bg-4 { background: linear-gradient(135deg, #F2994A, #F2C94C); } 
        .bg-5 { background: linear-gradient(135deg, #8E2DE2, #4A00E0); } 
        .bg-6 { background: linear-gradient(135deg, #eb3349, #f45c43); }

        /* Modal UI */
        #ad-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; justify-content: center; align-items: center; }
        #ad-modal-content { background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); width: 85%; max-width: 380px; border-radius: 30px; position: relative; text-align: center; padding: 35px 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); color: white; border: 2px solid rgba(255,255,255,0.2); }
        .inner-box { background: white; border-radius: 20px; padding: 25px 15px; display: flex; flex-direction: column; gap: 15px; }
        .modal-action-btn { padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        .continue-btn { background: #2575fc; color: white; }
        .verify-btn { background: #2ecc71; color: white; display: none; }
        
        .customer-service { display: flex; justify-content: space-around; padding: 12px 5px; background: white; margin: 0 15px 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .service-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .service-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .ws { background: #25D366; } .tg { background: #0088cc; } .yt { background: #FF0000; } .fb { background: #1877F2; }
        
        /* Bottom Nav Fix */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; color: #888; flex: 1; text-decoration: none; cursor: pointer; }
        .nav-item i { font-size: 20px; display: block; }
        .nav-item span { font-size: 11px; font-weight: bold; }
        .nav-item.active { color: #6a11cb; }
    </style>
</head>
<body>

<div id="ad-modal-overlay">
    <div id="ad-modal-content">
        <span style="position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer;" onclick="closeAdModal()">&times;</span>
        <div style="font-size: 18px; font-weight: bold; margin-bottom: 20px;">Ad हेरेर पैसा कमाउनुहोस्!</div>
        <div class="inner-box">
            <button class="modal-action-btn continue-btn" id="cont-btn" onclick="runAdFlow()">CONTINUE (Ad हेर्नुहोस्)</button>
            <button class="modal-action-btn verify-btn" id="verf-btn" onclick="verifyAndReward()">VERIFY (पैसा लिनुहोस्)</button>
            <p id="flow-status" style="color: #666; font-size: 13px; font-weight: 600;">पहिले विज्ञापन पूरा हेर्नुहोस्</p>
        </div>
    </div>
</div>

<div class="header">
    <div class="balance-btn">रु. <span id="balance">0.00</span></div>
    <h3>Daily Paisa</h3>
</div>

<div style="text-align: center; font-size: 13px; font-weight: bold; margin: 15px 0 8px;">Customer Service</div>
<div class="customer-service">
    <a href="https://whatsapp.com/channel/0029VbBv3sa4CrfhgIAwGG3c" class="service-item"><div class="service-icon ws"><i class="fab fa-whatsapp"></i></div></a>
    <a href="https://youtube.com/c/@watchads11" class="service-item"><div class="service-icon yt"><i class="fab fa-youtube"></i></div></a>
    <a href="https://facebook.com/100095014792136" class="service-item"><div class="service-icon fb"><i class="fab fa-facebook-f"></i></div></a>
    <a href="https://t.me/watchads11" class="service-item"><div class="service-icon tg"><i class="fab fa-telegram-plane"></i></div></a>
</div>

<div class="grid-container">
    <div class="box bg-1" onclick="goToCategory('history', 'इतिहास')">इतिहास</div>
    <div class="box bg-2" onclick="goToCategory('shayari', 'सायरि')">सायरि</div>
    <div class="box bg-3" onclick="goToCategory('motivation', 'Motivation')">Motivation</div>
    <div class="box bg-4" onclick="openAdModal()">Watch Ads 📺</div>
    
    <div class="box bg-ad-premium" onclick="openAdModal()">
        <i class="fas fa-gift" style="margin-right: 8px;"></i> Claim 0.05 Bonus 🎁
    </div>
    
    <div class="box bg-5" onclick="goToCategory('biography', 'जीवनी')">जीवनी</div>
    <div class="box bg-6" onclick="goToCategory('lifestyle', 'Lifestyle')">Lifestyle</div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="location.href='index.html'"><i class="fa fa-home"></i><span>Home</span></div>
    <div class="nav-item" onclick="location.href='history_content.html'"><i class="fa fa-history"></i><span>History</span></div> 
    <div class="nav-item" onclick="location.href='profile.html'"><i class="fa fa-user"></i><span>Profile</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJg13_ijiXoMs-WZEqLjl0TVO8QBp3eEc",
        authDomain: "watch-vidwo.firebaseapp.com",
        projectId: "watch-vidwo",
        storageBucket: "watch-vidwo.firebasestorage.app",
        messagingSenderId: "241433573771",
        appId: "1:241433573771:web:2dce688d35f4cef910578e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const currentUserPhone = localStorage.getItem("currentUser");
    let currentBalance = 0.00;

    window.onload = function() {
        if(!currentUserPhone) { window.location.href = "auth.html"; return; }
        if(localStorage.getItem("pendingVerify") === "true") { showVerifyButton(); }

        db.ref('users/' + currentUserPhone).on('value', (snapshot) => {
            if(snapshot.val()) {
                currentBalance = parseFloat(snapshot.val().referBalance || 0);
                document.getElementById('balance').innerText = currentBalance.toFixed(2);
            }
        });
    };

    window.onfocus = function() {
        if(localStorage.getItem("pendingVerify") === "true") { showVerifyButton(); }
    };

    function openAdModal() {
        document.getElementById('ad-modal-overlay').style.display = 'flex';
        if(localStorage.getItem("pendingVerify") === "true") {
            showVerifyButton();
        } else {
            document.getElementById('cont-btn').style.display = 'block';
            document.getElementById('verf-btn').style.display = 'none';
            document.getElementById('flow-status').innerText = "पहिले विज्ञापन पूरा हेर्नुहोस्";
            document.getElementById('flow-status').style.color = "#666";
        }
    }

    function runAdFlow() {
        localStorage.setItem("pendingVerify", "true");
        document.getElementById('flow-status').innerText = "Ad Loading...";
        window.location.href = "get_interstitial";
    }

    function showVerifyButton() {
        document.getElementById('cont-btn').style.display = 'none';
        document.getElementById('verf-btn').style.display = 'block';
        document.getElementById('flow-status').innerText = "अब पैसा दाबी गर्न VERIFY थिच्नुहोस्!";
        document.getElementById('flow-status').style.color = "green";
    }

    function verifyAndReward() {
        if(!currentUserPhone) return;
        let newBalance = currentBalance + 0.05;
        db.ref('users/' + currentUserPhone).update({ referBalance: newBalance }).then(() => {
            alert("बधाई छ! रु. ०.०५ थपियो। ✅");
            localStorage.removeItem("pendingVerify");
            document.getElementById('ad-modal-overlay').style.display = 'none';
        });
    }

    function closeAdModal() { document.getElementById('ad-modal-overlay').style.display = 'none'; }
    function goToCategory(type, name) { location.href = `content.html?type=${type}&name=${encodeURIComponent(name)}`; }
</script>

</body>
</html>
