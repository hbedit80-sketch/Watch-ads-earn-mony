<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script id="monetag-script">(function(s){s.dataset.zone='10828150',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        body { margin: 0; background: #f4f7f6; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        .top-bar { background: #2575fc; color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-icon { font-size: 20px; margin-right: 15px; cursor: pointer; }
        .container { padding: 15px; }
        .post-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .post-card:active { transform: scale(0.98); }
        .post-card img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .post-card h4 { padding: 12px; margin: 0; color: #333; font-size: 15px; }
        #post-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .close-view { font-size: 16px; color: #eb3349; cursor: pointer; margin-bottom: 15px; display: inline-block; font-weight: bold; background: #fff1f1; padding: 8px 15px; border-radius: 10px; }
        .full-img { width: 100%; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-height: 300px; object-fit: cover; }
        .full-text { line-height: 1.8; color: #444; margin-top: 15px; font-size: 16px; white-space: pre-wrap; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 1000; }
        .nav-item { text-align: center; color: #888; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item span { font-size: 11px; font-weight: bold; }
        .nav-item.active { color: #2575fc; }
        #loader { text-align: center; margin-top: 50px; color: #666; }
        
        /* पैसा थपिएको सूचना (Toast) */
        #reward-toast {
            display: none; position: fixed; bottom: 100px; left: 50%; 
            transform: translateX(-50%); background: #2ecc71; color: white;
            padding: 10px 20px; border-radius: 30px; font-weight: bold; z-index: 3000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="reward-toast">बधाई छ! रु ०.०२ थपियो। ✅</div>

<div class="top-bar">
    <i class="fa fa-arrow-left back-icon" onclick="history.back()"></i>
    <h3 id="cat-title" style="margin:0;">लोड हुँदैछ...</h3>
</div>

<div class="container" id="thumbnail-list">
    <div id="loader"><i class="fa fa-spinner fa-spin"></i> लोड हुँदैछ...</div>
</div>

<div id="post-viewer">
    <div class="close-view" onclick="closePost()"><i class="fa fa-times-circle"></i> बन्द गर्नुहोस्</div>
    <h2 id="view-title" style="color: #2575fc; font-size: 20px; margin-top:10px;"></h2>
    <img id="view-img" class="full-img" src="">
    <div id="view-body" class="full-text"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.href='index.html'"><i class="fa fa-home"></i><span>Home</span></div>
    <div class="nav-item active" onclick="location.href='history_content.html'"><i class="fa fa-history"></i><span>History</span></div>
    <div class="nav-item" onclick="location.href='profile.html'"><i class="fa fa-user"></i><span>Profile</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDJg13_ijiXoMs-WZEqLjl0TVO8QBp3eEc",
        authDomain: "watch-vidwo.firebaseapp.com",
        projectId: "watch-vidwo",
        storageBucket: "watch-vidwo.firebasestorage.app",
        messagingSenderId: "241433573771",
        appId: "1:241433573771:web:2dce688d35f4cef910578e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const currentUserPhone = localStorage.getItem("currentUser");
    
    let currentBalance = 0.00;
    let readingTimer = null;
    let adInterval = null;

    // युजरको ब्यालेन्स रियल-टाइममा तान्ने
    if(currentUserPhone) {
        db.ref('users/' + currentUserPhone).on('value', (snapshot) => {
            const user = snapshot.val();
            if(user) {
                currentBalance = parseFloat(user.referBalance || 0);
            }
        });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type') || 'ramayan';
    const catName = urlParams.get('name') || 'विवरण';
    document.getElementById('cat-title').innerText = catName;

    function loadContentFromFirebase() {
        const list = document.getElementById('thumbnail-list');
        const loader = document.getElementById('loader');
        
        db.ref('history_content/' + type).on('value', (snapshot) => {
            if (snapshot.exists()) {
                displayData(snapshot.val());
            } else {
                db.ref('content/' + type).on('value', (snap) => {
                    if (snap.exists()) displayData(snap.val());
                    else {
                        loader.style.display = 'none';
                        list.innerHTML = "<p style='text-align:center;'>सामग्री भेटिएन।</p>";
                    }
                });
            }
        });
    }

    function displayData(data) {
        const list = document.getElementById('thumbnail-list');
        document.getElementById('loader').style.display = 'none';
        list.innerHTML = "";
        Object.keys(data).forEach(key => {
            const item = data[key];
            const card = document.createElement('div');
            card.className = "post-card";
            card.onclick = () => openPost(item.title, item.image, item.body);
            card.innerHTML = `<img src="${item.image || ''}"><h4>${item.title}</h4>`;
            list.appendChild(card);
        });
    }

    function openPost(title, img, body) {
        document.getElementById('view-title').innerText = title;
        document.getElementById('view-img').src = img || '';
        document.getElementById('view-body').innerText = body;
        document.getElementById('post-viewer').style.display = 'block';
        document.getElementById('post-viewer').scrollTo(0,0);

        // १ मिनेटको टाइमर सुरु (६०००० ms)
        readingTimer = setTimeout(() => {
            addReadingReward();
        }, 60000);

        // १५-१५ सेकेन्डमा ४ पटक विज्ञापन रिफ्रेस गर्ने
        adInterval = setInterval(() => {
            refreshAds();
        }, 15000);
    }

    function refreshAds() {
        console.log("Ad Refreshed");
        const oldScript = document.getElementById('monetag-script');
        if (oldScript) {
            const newScript = document.createElement('script');
            newScript.id = 'monetag-script';
            newScript.dataset.zone = '10828150';
            newScript.src = 'https://nap5k.com/tag.min.js';
            oldScript.parentNode.replaceChild(newScript, oldScript);
        }
    }

    function addReadingReward() {
        if(!currentUserPhone) return;
        
        let newBalance = currentBalance + 0.02;
        db.ref('users/' + currentUserPhone).update({
            referBalance: newBalance
        }).then(() => {
            const toast = document.getElementById('reward-toast');
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 3000);
            
            // पैसा थपिएपछि त्यो पोस्टको लागि एड इन्टरभल बन्द गर्ने
            if(adInterval) clearInterval(adInterval);
        });
    }

    function closePost() {
        document.getElementById('post-viewer').style.display = 'none';
        // पोस्ट बन्द गर्दा टाइमरहरू रिसेट गर्ने
        if(readingTimer) clearTimeout(readingTimer);
        if(adInterval) clearInterval(adInterval);
    }

    loadContentFromFirebase();
</script>
</body>
</html>
